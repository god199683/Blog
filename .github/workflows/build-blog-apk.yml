name: Build Blog APK

on:
  push:
    branches:
      - app-version
    paths:
      - ".github/workflows/build-blog-apk.yml"
      - "android-app/**"
      - "manifest.webmanifest"
      - "service-worker.js"
      - "app-icon.svg"
      - "*.html"
      - "*.js"
      - "*.css"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app version
        uses: actions/checkout@v4
        with:
          ref: app-version
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle -p android-app assembleDebug --no-daemon

      - name: Prepare APK
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk Blog.apk

      - name: Commit APK to app-version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B app-version origin/app-version
          cp android-app/app/build/outputs/apk/debug/app-debug.apk Blog.apk
          git add Blog.apk
          if ! git diff --cached --quiet; then
            git commit -m "Add generated APK [skip ci]"
            git push origin HEAD:app-version
          fi

      - name: Commit APK only to main
        run: |
          mkdir -p /tmp/blog-apk
          cp Blog.apk /tmp/blog-apk/Blog.apk
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/blog-apk/Blog.apk Blog.apk
          git add Blog.apk
          if ! git diff --cached --quiet; then
            git commit -m "Add generated APK [skip ci]"
            git push origin HEAD:main
          fi
