<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="블로그 계정 관리">
    <title>계정 관리 | Blog</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="account-page">
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="My blog home">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span data-brand-text>Blog</span>
      </a>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button auth-login" href="./login.html">로그인</a>
        <a class="auth-button auth-signup" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="account-manage-main">
      <section class="account-manage-card" aria-labelledby="account-manage-title">
        <p class="section-kicker">계정</p>
        <h1 id="account-manage-title">계정 관리</h1>
        <dl>
          <div>
            <dt>아이디</dt>
            <dd data-account-id>-</dd>
          </div>
        </dl>
        <div class="account-manage-actions">
          <a href="./my-blog.html">내 블로그로 이동</a>
          <button type="button" data-account-logout>로그아웃</button>
        </div>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./account.js" defer></script>
  </body>
</html>
