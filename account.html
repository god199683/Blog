<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="블로그 계정 관리">
    <title>계정 관리 | 블로그 홈</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./password-toggle.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="블로그 홈">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./">홈</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="account-main">
      <section class="account-card" aria-labelledby="account-title">
        <p class="eyebrow">계정</p>
        <h1 id="account-title">계정 관리</h1>
        <dl class="account-list">
          <div>
            <dt>아이디</dt>
            <dd data-account-id>-</dd>
          </div>
        </dl>

        <section class="account-section" aria-labelledby="password-change-title">
          <h2 id="password-change-title">비밀번호 바꾸기</h2>
          <form class="account-form" data-password-form>
            <div class="form-field">
              <label for="current-password">현재 비밀번호</label>
              <div class="password-toggle-wrap">
                <input id="current-password" name="current-password" type="password" autocomplete="current-password" required>
                <button class="password-toggle-button" type="button" data-password-toggle="current-password" aria-label="비밀번호 표시" aria-pressed="false">
                  <span class="password-toggle-icon" aria-hidden="true"></span>
                </button>
              </div>
            </div>
            <div class="form-field">
              <label for="new-password">새 비밀번호</label>
              <div class="password-toggle-wrap">
                <input id="new-password" name="new-password" type="password" autocomplete="new-password" required>
                <button class="password-toggle-button" type="button" data-password-toggle="new-password" aria-label="비밀번호 표시" aria-pressed="false">
                  <span class="password-toggle-icon" aria-hidden="true"></span>
                </button>
              </div>
            </div>
            <div class="form-field">
              <label for="new-password-confirm">새 비밀번호 확인</label>
              <div class="password-toggle-wrap">
                <input id="new-password-confirm" name="new-password-confirm" type="password" autocomplete="new-password" required>
                <button class="password-toggle-button" type="button" data-password-toggle="new-password-confirm" aria-label="비밀번호 표시" aria-pressed="false">
                  <span class="password-toggle-icon" aria-hidden="true"></span>
                </button>
              </div>
            </div>
            <button class="auth-submit" type="submit">비밀번호 변경</button>
            <p class="auth-message" data-password-message role="status" aria-live="polite"></p>
          </form>
        </section>

        <section class="account-section" aria-labelledby="away-password-title">
          <h2 id="away-password-title">자리비움 패스워드 만들기</h2>
          <form class="account-form" data-away-form>
            <div class="form-field">
              <label for="away-password">자리비움 패스워드</label>
              <div class="password-toggle-wrap">
                <input id="away-password" name="away-password" type="password" autocomplete="new-password" required>
                <button class="password-toggle-button" type="button" data-password-toggle="away-password" aria-label="비밀번호 표시" aria-pressed="false">
                  <span class="password-toggle-icon" aria-hidden="true"></span>
                </button>
              </div>
            </div>
            <div class="form-field">
              <label for="away-password-confirm">자리비움 패스워드 확인</label>
              <div class="password-toggle-wrap">
                <input id="away-password-confirm" name="away-password-confirm" type="password" autocomplete="new-password" required>
                <button class="password-toggle-button" type="button" data-password-toggle="away-password-confirm" aria-label="비밀번호 표시" aria-pressed="false">
                  <span class="password-toggle-icon" aria-hidden="true"></span>
                </button>
              </div>
              <p class="field-help">상단바의 자리비움 버튼을 눌렀을 때 화면 잠금을 푸는 용도로 사용됩니다.</p>
            </div>
            <button class="auth-submit" type="submit">자리비움 패스워드 저장</button>
            <p class="auth-message" data-away-message role="status" aria-live="polite"></p>
          </form>
        </section>

        <div class="account-page-actions">
          <a class="auth-button" href="./">홈으로</a>
          <a class="auth-button" href="./my-blog.html">내 블로그</a>
          <button class="auth-button" type="button" data-account-logout>로그아웃</button>
          <button class="auth-button account-danger-button" type="button" data-account-delete>회원탈퇴</button>
        </div>
        <p class="auth-message" data-account-message role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./account.js" defer></script>
    <script src="./scroll-jump.js" defer></script>
    <script>
      document.addEventListener('click', (event) => {
        const button = event.target.closest('[data-password-toggle]');
        if (!button) return;
        const input = document.getElementById(button.dataset.passwordToggle);
        if (!input) return;
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        button.classList.toggle('is-visible', show);
        button.setAttribute('aria-pressed', String(show));
        button.setAttribute('aria-label', show ? '비밀번호 숨김' : '비밀번호 표시');
      });
    </script>
  </body>
</html>
