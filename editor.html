<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="블로그 글쓰기">
    <title>글쓰기 | Blog</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="editor-page">
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="My blog home">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span data-brand-text>Blog</span>
      </a>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button auth-login" href="./login.html">로그인</a>
        <a class="auth-button auth-signup" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="editor-page-main" aria-label="글쓰기">
      <form class="editor-shell" data-editor-form>
        <header class="editor-topbar">
          <div>
            <p class="editor-kicker">글쓰기</p>
          </div>
          <div class="editor-topbar-actions">
            <span class="editor-save-state" data-editor-save-state>초안 준비됨</span>
            <button class="editor-ghost-button" type="button" data-editor-preview>미리보기</button>
            <button class="editor-primary-button" type="submit" data-editor-submit>게시</button>
            <button class="editor-icon-button" type="button" data-editor-close aria-label="내 블로그로 돌아가기">×</button>
          </div>
        </header>

        <div class="editor-grid">
          <section class="editor-canvas">
            <label class="sr-only" for="editor-title">제목</label>
            <input
              class="editor-title-input"
              id="editor-title"
              type="text"
              data-editor-title
              placeholder="제목을 입력하세요"
              autocomplete="off"
            >

            <div class="editor-fields">
              <label>
                <span>카테고리</span>
                <select data-editor-category>
                  <option value="">카테고리 선택</option>
                </select>
              </label>
              <label>
                <span>폴더</span>
                <select data-editor-folder>
                  <option value="">폴더 없음</option>
                </select>
              </label>
            </div>

            <div class="editor-toolbar" role="toolbar" aria-label="글 편집 도구">
              <select data-editor-block aria-label="문단 형식">
                <option value="p">본문</option>
                <option value="h2">제목 2</option>
                <option value="h3">제목 3</option>
                <option value="blockquote">인용</option>
              </select>
              <button type="button" data-editor-command="bold" title="굵게">B</button>
              <button type="button" data-editor-command="italic" title="기울임">I</button>
              <button type="button" data-editor-command="underline" title="밑줄">U</button>
              <button type="button" data-editor-command="insertUnorderedList" title="목록">•</button>
              <button type="button" data-editor-command="insertOrderedList" title="번호 목록">1.</button>
              <button type="button" data-editor-command="formatBlock" data-value="blockquote" title="인용">“</button>
              <button type="button" data-editor-link title="링크">링크</button>
              <button type="button" data-editor-image title="이미지">이미지</button>
              <button type="button" data-editor-command="removeFormat" title="서식 제거">지우기</button>
            </div>

            <div
              class="editor-surface"
              contenteditable="true"
              data-editor-content
              role="textbox"
              aria-multiline="true"
              data-placeholder="여기에 글을 작성하세요..."
            ></div>
          </section>

          <aside class="editor-side-panel">
            <div>
              <p class="editor-side-label">상태</p>
              <strong data-editor-status>공개 게시</strong>
            </div>
            <div>
              <p class="editor-side-label">분량</p>
              <strong data-editor-reading-time>0분 읽기</strong>
            </div>
            <div>
              <p class="editor-side-label">작성자</p>
              <strong data-editor-author>-</strong>
            </div>
            <label class="editor-toggle-row">
              <input type="checkbox" data-editor-published checked>
              <span>공개 글로 게시</span>
            </label>
            <p class="editor-message" data-editor-message aria-live="polite"></p>
          </aside>
        </div>

        <section class="editor-preview-panel" data-editor-preview-panel hidden>
          <div class="editor-preview-head">
            <p class="editor-kicker">미리보기</p>
            <h3 data-editor-preview-title>제목 미리보기</h3>
          </div>
          <div class="editor-preview-body" data-editor-preview-body></div>
        </section>
      </form>
    </main>

    <script src="./session.js" defer></script>
    <script src="./editor.js" defer></script>
  </body>
</html>
