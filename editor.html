<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="블로그 글쓰기">
    <title>글쓰기 | Blog</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="editor-page">
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="My blog home">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span data-brand-text>Blog</span>
      </a>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button auth-login" href="./login.html">로그인</a>
        <a class="auth-button auth-signup" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="editor-page-main" aria-label="글쓰기">
      <form class="editor-shell" data-editor-form>
        <header class="editor-topbar">
          <div>
            <p class="editor-kicker">글쓰기</p>
          </div>
          <div class="editor-topbar-actions">
            <span class="editor-save-state" data-editor-save-state>임시 저장 준비</span>
            <button class="editor-ghost-button" type="button" data-editor-draft>임시 저장</button>
            <button class="editor-primary-button" type="submit" data-editor-submit>게시</button>
            <button class="editor-icon-button" type="button" data-editor-close aria-label="내 블로그로 돌아가기">×</button>
          </div>
        </header>

        <div class="editor-grid">
          <section class="editor-canvas">
            <label class="sr-only" for="editor-title">제목</label>
            <input
              class="editor-title-input"
              id="editor-title"
              type="text"
              data-editor-title
              placeholder="제목을 입력하세요"
              autocomplete="off"
            >

            <div class="editor-fields">
              <label>
                <span>카테고리</span>
                <select data-editor-category>
                  <option value="">카테고리 선택</option>
                </select>
              </label>
              <label>
                <span>폴더</span>
                <select data-editor-folder>
                  <option value="">폴더 없음</option>
                </select>
              </label>
            </div>

            <div class="editor-toolbar" data-editor-toolbar role="toolbar" aria-label="글 편집 도구">
              <div class="editor-toolbar-row">
                <select class="editor-font-select" data-editor-font-family aria-label="글꼴">
                  <option value="'a시네마'">a시네마</option>
                  <option value="Carlito">Carlito</option>
                  <option value="Arial">Arial</option>
                  <option value="'Noto Sans KR'">Noto Sans KR</option>
                  <option value="Georgia">Georgia</option>
                  <option value="'Courier New'">Courier New</option>
                </select>
                <button class="editor-add-font-button" type="button" data-editor-add-font title="글씨체 추가" aria-label="글씨체 추가">+</button>
                <input
                  class="editor-size-select"
                  type="number"
                  min="8"
                  max="96"
                  step="1"
                  value="16"
                  data-editor-font-size
                  aria-label="글자 크기"
                >
              </div>
              <div class="editor-toolbar-row">
                <button class="editor-tool-button" type="button" data-editor-command="bold" title="굵게" aria-label="굵게">
                  <span class="tool-letter tool-bold">가</span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="italic" title="기울임" aria-label="기울임">
                  <span class="tool-letter tool-italic">가</span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="underline" title="밑줄" aria-label="밑줄">
                  <span class="tool-letter tool-underline">가</span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="strikeThrough" title="취소선" aria-label="취소선">
                  <span class="tool-letter tool-strike">가</span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="superscript" title="위첨자" aria-label="위첨자">
                  <span class="script-icon script-super" aria-hidden="true">가</span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="subscript" title="아래첨자" aria-label="아래첨자">
                  <span class="script-icon script-sub" aria-hidden="true">가</span>
                </button>

                <span class="editor-tool-divider" aria-hidden="true"></span>

                <button class="editor-tool-button" type="button" data-editor-command="justifyLeft" title="왼쪽 정렬" aria-label="왼쪽 정렬">
                  <span class="align-icon align-left" aria-hidden="true"><i></i><i></i><i></i></span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="justifyCenter" title="가운데 정렬" aria-label="가운데 정렬">
                  <span class="align-icon align-center" aria-hidden="true"><i></i><i></i><i></i></span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="justifyRight" title="오른쪽 정렬" aria-label="오른쪽 정렬">
                  <span class="align-icon align-right" aria-hidden="true"><i></i><i></i><i></i></span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="justifyFull" title="양쪽 정렬" aria-label="양쪽 정렬">
                  <span class="align-icon align-justify" aria-hidden="true"><i></i><i></i><i></i></span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="insertUnorderedList" title="글머리표" aria-label="글머리표">
                  <span class="list-icon" aria-hidden="true"><i></i><i></i><i></i></span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="insertOrderedList" title="번호 목록" aria-label="번호 목록">
                  <span class="ordered-icon" aria-hidden="true">1</span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="outdent" title="내어쓰기" aria-label="내어쓰기">
                  <span class="indent-icon indent-out" aria-hidden="true"><i></i><i></i><i></i></span>
                </button>
                <button class="editor-tool-button" type="button" data-editor-command="indent" title="들여쓰기" aria-label="들여쓰기">
                  <span class="indent-icon indent-in" aria-hidden="true"><i></i><i></i><i></i></span>
                </button>

                <div class="editor-color-control">
                  <button class="editor-tool-button editor-color-button" type="button" data-line-menu-toggle title="줄 간격" aria-label="줄 간격">
                    <span class="line-height-icon" aria-hidden="true"><i></i><i></i><i></i></span>
                    <span class="tool-caret" aria-hidden="true"></span>
                  </button>
                  <div class="editor-mini-menu" data-line-menu hidden>
                    <button type="button" data-line-height="1">1.0</button>
                    <button type="button" data-line-height="1.15">1.15</button>
                    <button type="button" data-line-height="1.5">1.5</button>
                    <button type="button" data-line-height="2">2.0</button>
                  </div>
                </div>

                <span class="editor-tool-divider" aria-hidden="true"></span>

                <div class="editor-color-control">
                  <button class="editor-tool-button editor-color-button" type="button" data-color-menu-toggle="background" title="강조 색" aria-label="강조 색">
                    <span class="paint-icon" aria-hidden="true"></span>
                    <span class="tool-caret" aria-hidden="true"></span>
                  </button>
                  <div class="editor-color-menu" data-color-menu="background" hidden></div>
                </div>

                <div class="editor-color-control">
                  <button class="editor-tool-button editor-color-button" type="button" data-color-menu-toggle="foreground" title="글자 색" aria-label="글자 색">
                    <span class="font-color-icon" aria-hidden="true">가</span>
                    <span class="tool-caret" aria-hidden="true"></span>
                  </button>
                  <div class="editor-color-menu" data-color-menu="foreground" hidden></div>
                </div>

                <div class="editor-table-control">
                  <button class="editor-table-button" type="button" data-table-menu-toggle title="표" aria-label="표">
                    <span class="table-icon" aria-hidden="true"></span>
                    <span>표</span>
                  </button>
                  <div class="editor-table-menu" data-table-menu hidden>
                    <label>
                      <span>열</span>
                      <input type="number" min="1" max="12" value="3" data-table-cols>
                    </label>
                    <label>
                      <span>행</span>
                      <input type="number" min="1" max="12" value="3" data-table-rows>
                    </label>
                    <button type="button" data-table-insert>표 삽입</button>
                    <button type="button" data-table-add-row>행 추가</button>
                    <button type="button" data-table-add-col>열 추가</button>
                  </div>
                </div>
              </div>
            </div>

            <div
              class="editor-surface"
              contenteditable="true"
              data-editor-content
              role="textbox"
              aria-multiline="true"
              data-placeholder="여기에 글을 작성하세요..."
            ></div>
          </section>

          <aside class="editor-side-panel">
            <div class="editor-visibility-group" aria-label="공개 상태">
              <button class="editor-visibility-button is-active" type="button" data-editor-visibility="public">공개</button>
              <button class="editor-visibility-button" type="button" data-editor-visibility="private">비공개</button>
            </div>
            <div class="editor-count-box">
              <p class="editor-side-label">공백 포함</p>
              <strong data-editor-char-spaces>0자</strong>
            </div>
            <div class="editor-count-box">
              <p class="editor-side-label">공백 미포함</p>
              <strong data-editor-char-nospace>0자</strong>
            </div>
            <input type="checkbox" data-editor-published checked hidden>
            <p class="editor-message" data-editor-message aria-live="polite"></p>
          </aside>
        </div>
      </form>
    </main>

    <script src="./session.js" defer></script>
    <script src="./editor.js" defer></script>
  </body>
</html>
