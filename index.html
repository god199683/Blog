<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="심플한 공용 블로그 홈">
    <title>블로그 홈</title>
    <style>
      html, body { min-height: 100%; margin: 0; }
      body { background: #f4fbff; color: #102033; font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif; }
      .site-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 56px; padding: 0 16px; border-bottom: 1px solid #d8eafb; background: #fff; }
      .brand, .top-nav, .auth-actions { display: inline-flex; align-items: center; gap: 8px; }
      main { width: min(1080px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0; }
      a { color: inherit; text-decoration: none; }
      .auth-button, .top-nav a { padding: 6px 10px; border: 1px solid #d8eafb; border-radius: 999px; }
    </style>
    <link rel="preload" href="./styles.css?v=20260603" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="./styles.css?v=20260603"></noscript>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="블로그 홈">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./" aria-current="page">홈</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="home-main">
      <section class="home-hero" aria-labelledby="home-title">
        <div>
          <p class="eyebrow">공용 블로그 홈</p>
          <h1 id="home-title">블로그 홈</h1>
        </div>
        <p>가볍게 읽고, 차분하게 기록을 모으는 공간입니다.</p>
      </section>

      <section class="feed-section" aria-labelledby="feed-title">
        <div class="public-profile-strip" data-public-profiles hidden aria-label="공개 블로그 계정"></div>
        <div class="section-head">
          <h2 id="feed-title">피드</h2>
          <span>TODAY</span>
        </div>
        <div class="feed-list" aria-label="공개 글 목록">
          <div class="feed-list-head" aria-hidden="true">
            <span>글 제목</span>
            <span>작성일</span>
          </div>
          <div class="feed-empty">
            <p>공개된 글이 이곳에 표시됩니다.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>천천히 읽기 좋은 블로그.</p>
    </footer>
    <script src="./session.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
