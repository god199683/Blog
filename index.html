<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="하늘색과 흰색 테마의 개인 블로그" />
    <title>Blog</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#home" data-nav="home" aria-label="홈으로 이동">
        <span>
          <strong id="brandTitle">Blog</strong>
          <small>clean blue journal</small>
        </span>
      </a>

      <nav class="topnav" aria-label="주요 메뉴">
        <button class="nav-button is-active" type="button" data-nav="home">홈</button>
        <button class="nav-button" type="button" data-nav="myblog" id="myBlogNav" hidden>
          <i data-lucide="user-round"></i>
          내 블로그
        </button>
      </nav>

      <div class="top-actions">
        <button class="outline-button" type="button" id="authButton">로그인</button>
      </div>
    </header>

    <main id="app" class="app-shell"></main>

    <div id="toast" role="status" aria-live="polite"></div>

    <dialog class="modal" id="settingsDialog">
      <form id="settingsForm" class="modal-body">
        <div class="modal-head">
          <div>
            <p class="eyebrow">Supabase</p>
            <h2>연결 설정</h2>
          </div>
          <button class="icon-button" type="button" data-close-dialog="settingsDialog" aria-label="닫기" title="닫기">
            <i data-lucide="x"></i>
          </button>
        </div>
        <label class="field">
          <span>Project URL</span>
          <input id="supabaseUrl" type="url" readonly />
        </label>
        <label class="field">
          <span>Anon key</span>
          <input id="supabaseKey" type="password" autocomplete="off" placeholder="Supabase anon public key" />
        </label>
        <div class="modal-actions">
          <button class="ghost-button" type="button" id="clearKeyButton">키 지우기</button>
          <button class="primary-button" type="submit">저장</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="authDialog">
      <form id="authForm" class="modal-body">
        <div class="modal-head">
          <div>
            <p class="eyebrow">Writer</p>
            <h2 id="authTitle">작성자 로그인</h2>
          </div>
          <button class="icon-button" type="button" data-close-dialog="authDialog" aria-label="닫기" title="닫기">
            <i data-lucide="x"></i>
          </button>
        </div>
        <p class="status-line" id="authState">로그인 필요</p>
        <div class="auth-tabs" id="authTabs" role="tablist" aria-label="인증 방식">
          <button class="nav-button is-active" type="button" data-auth-mode="login">로그인</button>
          <button class="nav-button" type="button" data-auth-mode="signup">회원가입</button>
        </div>
        <label class="field">
          <span>아이디</span>
          <input id="authIdentifier" type="text" autocomplete="username" inputmode="latin" placeholder="영문, 숫자, 밑줄" />
        </label>
        <label class="field">
          <span>비밀번호</span>
          <input id="authPassword" type="password" autocomplete="current-password" />
        </label>
        <div class="modal-actions">
          <button class="outline-button" type="button" id="signOutButton" hidden>로그아웃</button>
          <button class="primary-button" type="submit" id="authSubmitButton">로그인</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
