<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="심플한 공용 블로그 홈">
    <title>블로그 홈</title>
    <style>
      :root {
        --bg: #f4fbff;
        --surface: #ffffff;
        --surface-soft: #eaf7ff;
        --ink: #102033;
        --muted: #6b7f91;
        --line: #d8eafb;
        --sky-dark: #0369a1;
        --shadow: 0 16px 36px rgba(14, 116, 144, 0.07);
      }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }
      body {
        min-width: 320px;
        background:
          radial-gradient(circle at 12% -8%, rgba(186, 230, 253, 0.36), transparent 22rem),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 62%, #f1faff 100%);
        color: var(--ink);
        font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
        font-size: 14.5px;
        line-height: 1.68;
      }
      a { color: inherit; text-decoration: none; }
      .site-header {
        position: sticky; top: 0; z-index: 10;
        display: flex; align-items: center; justify-content: space-between; gap: 0.7rem;
        min-height: 3.75rem; padding: 0 clamp(0.9rem, 4vw, 2rem);
        border-bottom: 1px solid rgba(216, 234, 251, 0.9);
        background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(16px);
      }
      .brand, .top-nav, .auth-actions { display: inline-flex; align-items: center; gap: 0.45rem; }
      .brand { font-weight: 820; }
      .brand-mark {
        display: grid; width: 1.9rem; height: 1.9rem; place-items: center;
        border: 1px solid rgba(56, 189, 248, 0.28); border-radius: 7px;
        background: #fff; color: var(--sky-dark); box-shadow: 0 8px 20px rgba(14, 116, 144, 0.08);
      }
      .top-nav { margin-left: auto; }
      .top-nav a, .auth-button {
        display: inline-flex; align-items: center; justify-content: center; min-height: 1.9rem;
        padding: 0.2rem 0.72rem; border: 1px solid rgba(56, 189, 248, 0.3);
        border-radius: 999px; background: rgba(255, 255, 255, 0.86); color: var(--sky-dark);
        font-size: 0.82rem; font-weight: 760; white-space: nowrap;
      }
      .top-nav a[aria-current="page"], .auth-button:hover, .top-nav a:hover { background: var(--surface-soft); }
      .auth-button-primary { background: var(--sky-dark); color: #fff; }
      .home-main { width: min(1080px, calc(100% - 2rem)); margin: 0 auto; padding: clamp(1.5rem, 5vw, 3.4rem) 0 4rem; }
      .home-hero {
        display: grid; gap: 0.65rem; padding: clamp(1.4rem, 4vw, 2.5rem);
        border: 1px solid rgba(186, 230, 253, 0.92); border-radius: 28px;
        background: rgba(255, 255, 255, 0.86); box-shadow: var(--shadow);
      }
      .eyebrow { margin: 0 0 0.3rem; color: var(--sky-dark); font-size: 0.78rem; font-weight: 800; letter-spacing: 0.1em; }
      h1 { margin: 0; font-size: clamp(2rem, 8vw, 4.5rem); line-height: 1.05; }
      .home-hero p:last-child { margin: 0; color: var(--muted); font-size: 1rem; }
      .feed-section {
        margin-top: 1.2rem; padding: clamp(1rem, 3vw, 1.4rem);
        border: 1px solid rgba(216, 234, 251, 0.96); border-radius: 22px;
        background: rgba(255, 255, 255, 0.82); box-shadow: var(--shadow);
      }
      .section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; }
      .section-head h2 { margin: 0; font-size: 1.4rem; }
      .section-head span { color: var(--sky-dark); font-weight: 800; }
      .feed-list { margin-top: 1rem; border-top: 1px solid var(--line); }
      .feed-list-head, .feed-empty { padding: 0.9rem 0; color: var(--muted); }
      .feed-list-head { display: flex; justify-content: space-between; font-weight: 800; }
      .feed-empty p { margin: 0; }
      .site-footer { width: min(1080px, calc(100% - 2rem)); margin: 0 auto; padding: 1.5rem 0 2rem; color: var(--muted); }
      @media (max-width: 560px) {
        .site-header { gap: 0.35rem; padding: 0 0.7rem; }
        .brand span:last-child { display: none; }
        .top-nav a, .auth-button { padding-inline: 0.55rem; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="블로그 홈">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./" aria-current="page">홈</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴">
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="home-main">
      <section class="home-hero" aria-labelledby="home-title">
        <div>
          <p class="eyebrow">공용 블로그 홈</p>
          <h1 id="home-title">블로그 홈</h1>
        </div>
        <p>가볍게 읽고, 차분하게 기록을 모으는 공간입니다.</p>
      </section>

      <section class="feed-section" aria-labelledby="feed-title">
        <div class="section-head">
          <h2 id="feed-title">피드</h2>
          <span>TODAY</span>
        </div>
        <div class="feed-list" aria-label="공개 글 목록">
          <div class="feed-list-head" aria-hidden="true">
            <span>글 제목</span>
            <span>작성일</span>
          </div>
          <div class="feed-empty">
            <p>공개된 글이 이곳에 표시됩니다.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>천천히 읽기 좋은 블로그.</p>
    </footer>
  </body>
</html>
