<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="모두에게 열린 블로그 홈">
    <title>Blog</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="Blog home">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>Blog</span>
      </a>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button auth-login" href="./login.html">로그인</a>
        <a class="auth-button auth-signup" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main>
      <section class="hero-section" id="featured" aria-labelledby="home-title">
        <div class="hero-copy">
          <p class="eyebrow">Public Journal</p>
          <h1 id="home-title">블로그 홈</h1>
          <p class="lede">
            생각, 기록, 작업 노트를 한곳에서 가볍게 훑어보고 깊게 읽을 수 있는 공개 피드입니다.
          </p>
          <form class="search-bar" id="search-form" role="search">
            <label class="sr-only" for="search-input">글 검색</label>
            <input id="search-input" type="search" placeholder="제목, 주제, 작성자로 검색" autocomplete="off">
            <button type="submit">검색</button>
          </form>
        </div>

        <article class="featured-card" id="featured-card" aria-live="polite">
          <div class="featured-media skeleton"></div>
          <div class="featured-body">
            <p class="meta-line">글을 불러오는 중</p>
            <h2>잠시만 기다려 주세요</h2>
            <p>공개된 글을 확인하고 있습니다.</p>
          </div>
        </article>
      </section>

      <section class="toolbar-section" id="topics" aria-label="주제 필터">
        <div>
          <p class="section-kicker">Topics</p>
          <h2>주제별로 빠르게 보기</h2>
        </div>
        <div class="topic-tabs" id="topic-tabs" role="list"></div>
      </section>

      <section class="content-layout" id="latest">
        <div>
          <div class="section-heading">
            <div>
              <p class="section-kicker">Latest</p>
              <h2>새로 올라온 글</h2>
            </div>
            <p class="result-count" id="result-count">0개 글</p>
          </div>
          <div class="post-grid" id="post-grid" aria-live="polite"></div>
        </div>

        <aside class="side-panel" aria-label="블로그 정보">
          <div class="status-panel">
            <p class="section-kicker">Feed</p>
            <h2 id="data-status">콘텐츠 준비 중</h2>
            <p id="status-copy">공개된 글을 확인하고 있습니다.</p>
          </div>

          <div class="note-panel">
            <p class="section-kicker">Today</p>
            <h2>읽는 흐름</h2>
            <ol class="reading-list" id="reading-list"></ol>
          </div>
        </aside>
      </section>
    </main>

    <dialog class="post-dialog" id="post-dialog">
      <button class="dialog-close" type="button" id="dialog-close" aria-label="닫기">×</button>
      <div id="dialog-content"></div>
    </dialog>

    <footer class="site-footer">
      <p>© <span id="year"></span> Blog. 모두에게 열린 기록 공간.</p>
      <a href="https://github.com/god199683/Blog" target="_blank" rel="noreferrer">GitHub</a>
    </footer>

    <script src="./session.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
