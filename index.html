<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="심플한 공용 블로그 홈">
    <title>블로그 홈</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="블로그 홈">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./" aria-current="page">홈</a>
        <a href="#feed-title">피드</a>
      </nav>
    </header>

    <main class="home-main">
      <section class="home-hero" aria-labelledby="home-title">
        <div>
          <p class="eyebrow">공용 블로그 홈</p>
          <h1 id="home-title">블로그 홈</h1>
        </div>
        <p>가볍게 읽고, 차분하게 기록을 모으는 공간입니다.</p>
      </section>

      <section class="feed-section" aria-labelledby="feed-title">
        <div class="section-head">
          <h2 id="feed-title">피드</h2>
          <span>TODAY</span>
        </div>
        <div class="feed-list" aria-label="공개 글 목록">
          <div class="feed-list-head" aria-hidden="true">
            <span>글 제목</span>
            <span>작성일</span>
          </div>
          <div class="feed-empty">
            <p>공개된 글이 이곳에 표시됩니다.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>천천히 읽기 좋은 블로그.</p>
    </footer>
  </body>
</html>
