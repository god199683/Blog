<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="자료실 휴지통">
    <title>자료실 휴지통 | 내 블로그</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="trash-page">
    <header class="site-header">
      <a class="brand" href="./materials.html" aria-label="자료실">
        <span class="brand-mark" data-blog-initial aria-hidden="true">B</span>
        <span data-brand-title>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./">홈</a>
        <a href="./my-blog.html">내 블로그</a>
        <a href="./materials.html">자료실</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button auth-login" href="./login.html">로그인</a>
        <a class="auth-button auth-signup" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="trash-page-main">
      <section class="trash-page-shell" aria-labelledby="materials-trash-title">
        <div class="trash-page-topbar">
          <div>
            <a class="trash-back-link" href="./materials.html">← 자료실</a>
            <h1 id="materials-trash-title">자료실 휴지통</h1>
            <p data-materials-trash-summary>삭제된 자료를 불러오는 중입니다.</p>
          </div>
          <div class="trash-page-actions" aria-label="자료실 휴지통 기능">
            <button type="button" data-materials-trash-selection-toggle aria-label="선택 모드" title="선택 모드">
              <span class="panel-action-icon icon-select" aria-hidden="true"></span>
            </button>
            <button type="button" data-materials-trash-restore aria-label="복원" title="복원" disabled>
              <span class="panel-action-icon icon-restore" aria-hidden="true"></span>
            </button>
            <button type="button" data-materials-trash-delete-selected aria-label="선택항목 삭제" title="선택항목 삭제" disabled>
              <span class="panel-action-icon icon-delete" aria-hidden="true"></span>
            </button>
            <button type="button" data-materials-trash-empty aria-label="비우기" title="비우기" disabled>
              <span class="panel-action-icon icon-empty" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <p class="trash-page-status" data-materials-trash-status aria-live="polite"></p>
        <div class="trash-page-list" data-materials-trash-list></div>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./materials-trash.js" defer></script>
  </body>
</html>
