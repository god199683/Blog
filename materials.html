<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="내 블로그 자료실">
    <title>자료실 | 내 블로그</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="내 블로그 홈">
        <span class="brand-mark" data-blog-initial aria-hidden="true">B</span>
        <span data-brand-title>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./">홈</a>
        <a href="./my-blog.html">내 블로그</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="blog-main materials-main">
      <section class="personal-cover blog-cover" aria-labelledby="materials-title">
        <div>
          <p class="eyebrow">내 블로그</p>
          <h1 id="materials-title" data-materials-title>자료실</h1>
          <p data-materials-owner>계정별 독립 자료실입니다.</p>
        </div>
        <span class="personal-mark" data-blog-initial aria-hidden="true">B</span>
      </section>

      <nav class="blog-menu-bar" aria-label="블로그 메뉴">
        <a href="./my-blog.html">블로그 홈</a>
        <a href="./materials.html" aria-current="page">자료실</a>
        <a class="blog-write-button" href="./editor.html?mode=new&target=materials">글쓰기</a>
      </nav>

      <div class="blog-body-layout materials-blog-layout">
        <aside class="blog-side-panel" aria-label="자료실 정보">
          <div class="blog-profile-box">
            <span class="blog-profile-mark" data-blog-initial aria-hidden="true">B</span>
            <div>
              <strong data-profile-title>자료실</strong>
              <span data-profile-id>@materials</span>
            </div>
            <button class="blog-profile-tool" type="button" data-material-tools-toggle aria-expanded="false" aria-label="도구">
              <span aria-hidden="true"></span>
            </button>
          </div>
          <div class="blog-tool-panel" data-material-tools hidden>
            <button class="blog-tool-action" type="button" data-material-action="add-category" title="카테고리 추가" aria-label="카테고리 추가">
              <span class="tree-action-icon tree-action-plus" aria-hidden="true"></span>
            </button>
            <button class="blog-tool-action" type="button" data-material-action="add-space" title="공간 추가" aria-label="공간 추가">
              <span class="tree-action-icon tree-action-space" aria-hidden="true"></span>
            </button>
            <button class="blog-tool-action" type="button" data-material-action="toggle-selection" title="선택 모드" aria-label="선택 모드">
              <span class="tree-action-icon tree-action-check" aria-hidden="true"></span>
            </button>
            <button class="blog-tool-action" type="button" data-material-action="delete-selected" title="삭제" aria-label="삭제">
              <span class="tree-action-icon tree-action-trash" aria-hidden="true"></span>
            </button>
            <button class="blog-tool-action" type="button" data-material-action="import-files" title="불러오기" aria-label="불러오기">
              <span class="tree-action-icon tree-action-import" aria-hidden="true"></span>
            </button>
            <button class="blog-tool-action" type="button" data-material-action="export-files" title="내보내기" aria-label="내보내기">
              <span class="tree-action-icon tree-action-export" aria-hidden="true"></span>
            </button>
            <input
              class="sr-only"
              type="file"
              data-material-file-import
              accept=".txt,.md,.html,.htm,.rtf,.docx,text/plain,text/markdown,text/html,application/rtf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
              multiple
            >
          </div>

          <nav class="materials-side-split" aria-label="자료실 영역">
            <section class="materials-section-panel materials-section-panel--materials">
              <div class="materials-section-heading">
                <span>자료</span>
                <small data-material-section-count="materials">0개의 자료</small>
              </div>
              <div class="blog-side-links materials-tree-all">
                <button type="button" data-material-tree-all aria-current="page">전체 자료</button>
              </div>
              <div class="blog-tree materials-tree" data-material-tree aria-label="자료 카테고리와 폴더"></div>
            </section>
            <button class="materials-section-card" type="button" data-material-section="spaces">
              <span>공간</span>
              <small data-material-section-count="spaces">0개의 공간</small>
            </button>
          </nav>

          <a class="blog-trash-link" href="./materials-trash.html">휴지통</a>
        </aside>

        <section class="blog-board is-list-collapsed" aria-labelledby="materials-board-title" data-material-board>
          <div class="blog-board-head">
            <h2 id="materials-board-title"><span data-material-board-title>전체 자료</span> <span data-material-count>0개의 자료</span></h2>
            <div class="blog-board-actions" aria-label="자료 목록 관리">
              <button class="blog-board-icon-button" type="button" data-material-select-mode aria-pressed="false" title="선택 모드" aria-label="선택 모드">
                <span class="board-action-icon board-action-select" aria-hidden="true"></span>
              </button>
              <button class="blog-board-icon-button" type="button" data-material-select-all disabled title="현재 목록 전체 선택" aria-label="현재 목록 전체 선택">
                <span class="board-action-icon board-action-check-all" aria-hidden="true"></span>
              </button>
              <button class="blog-board-icon-button" type="button" data-material-delete-selected disabled title="선택항목 삭제" aria-label="선택항목 삭제">
                <span class="tree-action-icon tree-action-trash" aria-hidden="true"></span>
              </button>
              <button class="blog-board-toggle" type="button" data-material-list-toggle aria-expanded="false">목록열기</button>
            </div>
          </div>

          <div class="blog-table" aria-label="자료 목록" data-material-table>
            <div class="blog-table-head">
              <span data-material-title-heading>자료 제목</span>
              <span data-material-type-heading>종류</span>
              <span>등록일</span>
              <span class="blog-table-sort-actions">
                <button class="blog-title-sort blog-latest-sort" type="button" data-material-latest-sort aria-label="최신글 정렬" title="최신글 정렬">
                  <span class="board-action-icon board-action-latest" aria-hidden="true"></span>
                </button>
                <button class="blog-title-sort" type="button" data-material-title-sort aria-label="제목 오름차순 정렬" title="제목 오름차순 정렬">
                  <span class="blog-title-sort-icon" aria-hidden="true"></span>
                </button>
              </span>
            </div>
            <div data-material-list>
              <div class="blog-empty-row">
                <span>아직 저장된 자료가 없습니다.</span>
                <span>-</span>
                <span>-</span>
                <span aria-hidden="true"></span>
              </div>
            </div>
          </div>

          <section class="materials-space-grid" data-material-space-grid hidden></section>
          <article class="blog-feature-card materials-feature-card" data-material-feature-card hidden></article>
          <section class="blog-mini-list" data-material-mini-list hidden></section>
        </section>
      </div>
    </main>

    <div class="blog-scroll-jump" aria-label="빠른 이동">
      <button type="button" data-scroll-top title="최상단으로" aria-label="최상단으로">
        <span class="scroll-jump-icon scroll-jump-up" aria-hidden="true"></span>
      </button>
      <button type="button" data-scroll-bottom title="최하단으로" aria-label="최하단으로">
        <span class="scroll-jump-icon scroll-jump-down" aria-hidden="true"></span>
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js" defer></script>
    <script src="./session.js" defer></script>
    <script src="./materials.js" defer></script>
  </body>
</html>
