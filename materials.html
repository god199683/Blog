<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="내 블로그 자료실">
    <title>자료실 | 내 블로그</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="내 블로그 홈">
        <span class="brand-mark" data-blog-initial aria-hidden="true">B</span>
        <span data-brand-title>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./">홈</a>
        <a href="./my-blog.html">내 블로그</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="blog-main materials-main">
      <section class="personal-cover blog-cover" aria-labelledby="materials-title">
        <div>
          <p class="eyebrow">내 블로그</p>
          <h1 id="materials-title" data-materials-title>자료실</h1>
          <p data-materials-owner>내 블로그와 연결된 자료를 보기 좋게 정리합니다.</p>
        </div>
        <span class="personal-mark" data-blog-initial aria-hidden="true">B</span>
      </section>

      <nav class="blog-menu-bar" aria-label="블로그 메뉴">
        <a href="./my-blog.html">블로그 홈</a>
        <a href="./materials.html" aria-current="page">자료실</a>
        <a class="blog-write-button" href="./editor.html?mode=new">글쓰기</a>
      </nav>

      <section class="materials-shell" aria-live="polite">
        <div class="materials-topbar">
          <div>
            <p class="eyebrow">자료실</p>
            <h2>자료 현황</h2>
          </div>
          <div class="materials-actions">
            <a href="./my-blog.html">블로그 홈</a>
            <a href="./materials-trash.html">자료실 휴지통</a>
          </div>
        </div>

        <div class="materials-stats" data-materials-stats>
          <article class="materials-stat">
            <span>전체 자료</span>
            <strong>0</strong>
          </article>
          <article class="materials-stat">
            <span>메모 자료</span>
            <strong>0</strong>
          </article>
          <article class="materials-stat">
            <span>링크 자료</span>
            <strong>0</strong>
          </article>
          <article class="materials-stat">
            <span>파일 자료</span>
            <strong>0</strong>
          </article>
        </div>

        <section class="materials-card materials-space-card" aria-labelledby="materials-space-title">
          <div class="materials-card-head">
            <div>
              <h3 id="materials-space-title">자료실</h3>
              <p data-materials-space-count>0개의 자료</p>
            </div>
            <span class="materials-space-chip">대시보드</span>
          </div>

          <div class="materials-room-dashboard" data-materials-room-dashboard>
            <article>
              <span>저장 자료</span>
              <strong>0</strong>
            </article>
            <article>
              <span>링크 자료</span>
              <strong>0</strong>
            </article>
            <article>
              <span>파일 자료</span>
              <strong>0</strong>
            </article>
            <article>
              <span>최근 등록</span>
              <strong>-</strong>
            </article>
          </div>

          <form class="materials-form" data-material-form>
            <label>
              <span>자료 제목</span>
              <input type="text" maxlength="120" placeholder="자료 제목" autocomplete="off" data-material-title required>
            </label>
            <label>
              <span>자료 종류</span>
              <select data-material-type>
                <option value="note">메모</option>
                <option value="link">링크</option>
                <option value="file">파일</option>
                <option value="reference">참고</option>
              </select>
            </label>
            <label class="materials-form-wide">
              <span>링크 또는 파일 경로</span>
              <input type="text" placeholder="https:// 또는 파일 이름" autocomplete="off" data-material-url>
            </label>
            <label class="materials-form-wide materials-form-note">
              <span>내용</span>
              <textarea rows="3" placeholder="짧은 설명이나 필요한 내용을 적어주세요." data-material-content></textarea>
            </label>
            <button type="submit">저장</button>
          </form>

          <div class="materials-list materials-space-list" data-materials-space>
            <p class="materials-empty">아직 저장된 자료가 없습니다.</p>
          </div>
        </section>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./materials.js" defer></script>
  </body>
</html>
