<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="내 블로그 자료 대시보드">
    <title>자료 | 내 블로그</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="내 블로그 홈">
        <span class="brand-mark" data-blog-initial aria-hidden="true">B</span>
        <span data-brand-title>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./">홈</a>
        <a href="./my-blog.html">내 블로그</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="blog-main materials-main">
      <section class="personal-cover blog-cover" aria-labelledby="materials-title">
        <div>
          <p class="eyebrow">내 블로그</p>
          <h1 id="materials-title" data-materials-title>자료 대시보드</h1>
          <p data-materials-owner>내 블로그와 연결된 자료를 정리합니다.</p>
        </div>
        <span class="personal-mark" data-blog-initial aria-hidden="true">B</span>
      </section>

      <nav class="blog-menu-bar" aria-label="블로그 메뉴">
        <a href="./my-blog.html">블로그 홈</a>
        <a href="./materials.html" aria-current="page">자료</a>
        <a class="blog-write-button" href="./editor.html?mode=new">글쓰기</a>
      </nav>

      <section class="materials-shell" aria-live="polite">
        <div class="materials-topbar">
          <div>
            <p class="eyebrow">자료 현황</p>
            <h2>블로그 자료</h2>
          </div>
          <div class="materials-actions">
            <a href="./my-blog.html">블로그 홈</a>
            <a href="./trash.html">휴지통</a>
          </div>
        </div>

        <div class="materials-stats" data-materials-stats>
          <article class="materials-stat">
            <span>전체 글</span>
            <strong>0</strong>
          </article>
          <article class="materials-stat">
            <span>공개 글</span>
            <strong>0</strong>
          </article>
          <article class="materials-stat">
            <span>카테고리</span>
            <strong>0</strong>
          </article>
          <article class="materials-stat">
            <span>폴더</span>
            <strong>0</strong>
          </article>
        </div>

        <div class="materials-grid">
          <section class="materials-card materials-card-wide" aria-labelledby="materials-recent-title">
            <div class="materials-card-head">
              <h3 id="materials-recent-title">최근 자료</h3>
              <a href="./editor.html?mode=new">글쓰기</a>
            </div>
            <div class="materials-list" data-materials-recent>
              <p class="materials-empty">자료를 불러오는 중입니다.</p>
            </div>
          </section>

          <section class="materials-card" aria-labelledby="materials-category-title">
            <div class="materials-card-head">
              <h3 id="materials-category-title">카테고리 현황</h3>
            </div>
            <div class="materials-list" data-materials-categories>
              <p class="materials-empty">자료를 불러오는 중입니다.</p>
            </div>
          </section>

          <section class="materials-card" aria-labelledby="materials-folder-title">
            <div class="materials-card-head">
              <h3 id="materials-folder-title">폴더 자료</h3>
            </div>
            <div class="materials-list" data-materials-folders>
              <p class="materials-empty">자료를 불러오는 중입니다.</p>
            </div>
          </section>

          <section class="materials-card materials-card-wide" aria-labelledby="materials-status-title">
            <div class="materials-card-head">
              <h3 id="materials-status-title">자료 상태</h3>
            </div>
            <div class="materials-status-grid" data-materials-status>
              <p class="materials-empty">자료를 불러오는 중입니다.</p>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./materials.js" defer></script>
  </body>
</html>
