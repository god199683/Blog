<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="계정별 블로그 홈">
    <title>내 블로그 | 블로그 홈</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="내 블로그 홈">
        <span class="brand-mark" data-blog-initial aria-hidden="true">B</span>
        <span data-brand-title>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./">홈</a>
        <a href="./my-blog.html" aria-current="page">내 블로그</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="blog-main">
      <section class="personal-cover blog-cover" aria-labelledby="blog-title">
        <div>
          <p class="eyebrow">내 블로그</p>
          <h1 id="blog-title" data-blog-title>Blog</h1>
          <p data-blog-owner>계정별 블로그 홈입니다.</p>
        </div>
        <span class="personal-mark" data-blog-initial aria-hidden="true">B</span>
      </section>

      <nav class="blog-menu-bar" aria-label="블로그 메뉴">
        <a href="./my-blog.html" aria-current="page">블로그 홈</a>
        <a href="./materials.html" data-owner-only-link>자료실</a>
        <a class="blog-write-button" href="./editor.html?mode=new">글쓰기</a>
      </nav>

      <div class="blog-body-layout">
        <aside class="blog-side-panel" aria-label="블로그 정보">
          <button class="blog-sidebar-toggle" type="button" data-sidebar-toggle aria-expanded="true" aria-label="사이드바 접기">
            <span aria-hidden="true"></span>
          </button>
          <div class="blog-profile-box">
            <span class="blog-profile-mark" data-blog-initial aria-hidden="true">B</span>
            <div>
              <strong data-profile-title>Blog</strong>
              <span data-profile-id>@blog</span>
            </div>
            <button class="blog-profile-tool" type="button" data-tree-tools-toggle aria-expanded="false" aria-label="도구">
              <span aria-hidden="true"></span>
            </button>
          </div>
          <div class="blog-tool-panel" data-tree-tools hidden>
            <button class="blog-tool-action" type="button" data-tree-action="add-category" title="카테고리 추가" aria-label="카테고리 추가">
              <span class="tree-action-icon tree-action-plus" aria-hidden="true"></span>
            </button>
            <button class="blog-tool-action" type="button" data-tree-action="toggle-selection" title="선택 모드" aria-label="선택 모드">
              <span class="tree-action-icon tree-action-check" aria-hidden="true"></span>
            </button>
            <button class="blog-tool-action" type="button" data-tree-action="delete-selected" title="삭제" aria-label="삭제">
              <span class="tree-action-icon tree-action-trash" aria-hidden="true"></span>
            </button>
            <button class="blog-tool-action" type="button" data-tree-action="import-files" title="불러오기" aria-label="불러오기">
              <span class="tree-action-icon tree-action-import" aria-hidden="true"></span>
            </button>
            <button class="blog-tool-action" type="button" data-tree-action="export-files" title="내보내기" aria-label="내보내기">
              <span class="tree-action-icon tree-action-export" aria-hidden="true"></span>
            </button>
            <input
              class="sr-only"
              type="file"
              data-file-import
              accept=".txt,.md,.html,.htm,.rtf,.docx,text/plain,text/markdown,text/html,application/rtf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
              multiple
            >
          </div>
          <section class="naver-side-widget" aria-labelledby="blog-search-title">
            <h2 id="blog-search-title">블로그 검색</h2>
            <form class="blog-search-form" data-blog-search-form>
              <input type="search" data-blog-search-input placeholder="글 검색" aria-label="글 검색">
              <button type="submit">검색</button>
            </form>
          </section>
          <nav class="blog-side-links" aria-label="블로그 바로가기">
            <button type="button" data-tree-all aria-current="page">전체글</button>
          </nav>
          <div class="blog-tree" data-blog-tree aria-label="카테고리와 폴더"></div>
          <a class="blog-trash-link" href="./trash.html">휴지통</a>
        </aside>

        <section class="blog-board is-list-collapsed" id="blog-posts" aria-labelledby="personal-feed-title" data-blog-board>
          <div class="blog-board-head">
            <h2 id="personal-feed-title"><span data-board-title>전체보기</span> <span data-blog-count>0개의 글</span></h2>
            <div class="blog-board-actions" aria-label="글 목록 관리">
              <button class="blog-board-icon-button" type="button" data-post-select-mode aria-pressed="false" title="선택 모드" aria-label="선택 모드" hidden>
                <span class="board-action-icon board-action-select" aria-hidden="true"></span>
              </button>
              <button class="blog-board-icon-button" type="button" data-post-select-all disabled title="현재 페이지 전체 선택" aria-label="현재 페이지 전체 선택" hidden>
                <span class="board-action-icon board-action-check-all" aria-hidden="true"></span>
              </button>
              <button class="blog-board-icon-button" type="button" data-post-visibility-toggle disabled title="공개/비공개 변경" aria-label="공개/비공개 변경" hidden>
                <span class="board-action-icon board-action-visibility" aria-hidden="true"></span>
              </button>
              <button class="blog-board-icon-button" type="button" data-post-delete-selected disabled title="선택 글 삭제" aria-label="선택 글 삭제" hidden>
                <span class="tree-action-icon tree-action-trash" aria-hidden="true"></span>
              </button>
              <button class="blog-board-icon-button" type="button" data-post-move-selected disabled title="선택 글 이동" aria-label="선택 글 이동" hidden>
                <span class="board-action-icon board-action-move" aria-hidden="true"></span>
              </button>
              <button class="blog-board-toggle" type="button" data-list-toggle aria-expanded="false">목록열기</button>
            </div>
          </div>

          <div class="blog-table" aria-label="내 블로그 글 목록">
            <div class="blog-table-head">
              <span>글 제목</span>
              <span>조회수</span>
              <span>작성일</span>
              <span class="blog-table-sort-actions">
                <button class="blog-title-sort blog-latest-sort" type="button" data-latest-sort aria-label="최신글 정렬" title="최신글 정렬">
                  <span class="board-action-icon board-action-latest" aria-hidden="true"></span>
                </button>
                <button class="blog-title-sort" type="button" data-title-sort aria-label="제목 오름차순 정렬" title="제목 오름차순 정렬">
                  <span class="blog-title-sort-icon" aria-hidden="true"></span>
                </button>
              </span>
            </div>
            <div data-post-list>
              <div class="blog-empty-row">
                <span>아직 작성된 글이 없습니다.</span>
                <span>0</span>
                <span>-</span>
                <span aria-hidden="true"></span>
              </div>
            </div>
          </div>

          <article class="blog-feature-card" data-feature-card hidden></article>
          <section class="blog-mini-list" data-blog-mini-list hidden></section>
        </section>
      </div>
    </main>

    <div class="blog-scroll-jump" aria-label="빠른 이동">
      <button type="button" data-scroll-top title="최상단으로" aria-label="최상단으로">
        <span class="scroll-jump-icon scroll-jump-up" aria-hidden="true"></span>
      </button>
      <button type="button" data-scroll-bottom title="최하단으로" aria-label="최하단으로">
        <span class="scroll-jump-icon scroll-jump-down" aria-hidden="true"></span>
      </button>
    </div>

    <div class="editor-location-backdrop" data-import-location-dialog hidden>
      <section class="editor-location-dialog" role="dialog" aria-modal="true" aria-labelledby="import-location-title">
        <header class="editor-location-head">
          <h2 id="import-location-title" data-import-location-title>불러올 위치 선택</h2>
          <button type="button" data-import-location-close aria-label="닫기">×</button>
        </header>
        <div class="editor-location-list" data-import-location-options></div>
        <footer class="editor-location-actions">
          <button class="editor-ghost-button" type="button" data-import-location-cancel>취소</button>
          <button class="editor-primary-button" type="button" data-import-location-confirm disabled>선택 후 불러오기</button>
        </footer>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js" defer></script>
    <script src="./blog-fetch-limit-fix.js" defer></script>
    <script src="./session.js" defer></script>
    <script src="./my-blog.js" defer></script>
    <script src="./blog-post-list-guard.js" defer></script>
  </body>
</html>
