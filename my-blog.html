<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="계정별 블로그 홈">
    <title>내 블로그 | Blog</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="My blog home">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span data-brand-text>Blog</span>
      </a>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button auth-login" href="./login.html">로그인</a>
        <a class="auth-button auth-signup" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="my-blog-main" data-my-blog-main>
      <aside class="my-sidebar" data-sidebar>
        <div class="my-sidebar-head">
          <div class="my-sidebar-title">
            <p class="section-kicker">메뉴</p>
          </div>
          <button
            class="sidebar-toggle"
            type="button"
            data-sidebar-toggle
            aria-label="사이드바 접기"
            aria-expanded="true"
          >
            ‹
          </button>
        </div>
        <nav class="my-sidebar-nav" id="my-sidebar-nav" aria-label="내 글 필터"></nav>
      </aside>

      <section class="my-post-area" aria-labelledby="my-post-title">
        <div class="my-post-header">
          <div>
            <p class="section-kicker">Posts</p>
            <h1 id="my-post-title">내 글 목록</h1>
          </div>
          <p class="result-count" id="my-post-count">0개 글</p>
        </div>
        <p class="my-post-status" id="my-post-status" aria-live="polite"></p>
        <div class="my-post-list" id="my-post-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./my-blog.js" defer></script>
  </body>
</html>
