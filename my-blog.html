<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="계정별 블로그 홈">
    <title>내 블로그 | 블로그 홈</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="블로그 홈">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./">홈</a>
        <a href="./my-blog.html" aria-current="page">내 블로그</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="blog-main">
      <section class="personal-cover" aria-labelledby="blog-title">
        <span class="personal-mark" data-blog-initial aria-hidden="true">B</span>
        <div>
          <p class="eyebrow">내 블로그</p>
          <h1 id="blog-title" data-blog-title>Blog</h1>
          <p data-blog-owner>계정별 블로그 홈입니다.</p>
        </div>
      </section>

      <section class="personal-feed" aria-labelledby="personal-feed-title">
        <div class="section-head">
          <h2 id="personal-feed-title">전체글</h2>
          <span data-blog-count>0개</span>
        </div>
        <div class="feed-list" aria-label="내 블로그 글 목록">
          <div class="feed-list-head" aria-hidden="true">
            <span>글 제목</span>
            <span>작성일</span>
          </div>
          <div class="feed-empty">
            <p>아직 작성된 글이 없습니다.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./my-blog.js" defer></script>
  </body>
</html>
