<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="계정별 블로그 홈">
    <title>내 블로그 | 블로그 홈</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="내 블로그 홈">
        <span class="brand-mark" data-blog-initial aria-hidden="true">B</span>
        <span data-brand-title>Blog</span>
      </a>
      <nav class="top-nav" aria-label="상단 메뉴">
        <a href="./">홈</a>
        <a href="./my-blog.html" aria-current="page">내 블로그</a>
      </nav>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="blog-main">
      <section class="personal-cover blog-cover" aria-labelledby="blog-title">
        <div>
          <p class="eyebrow">내 블로그</p>
          <h1 id="blog-title" data-blog-title>Blog</h1>
          <p data-blog-owner>계정별 블로그 홈입니다.</p>
        </div>
        <span class="personal-mark" data-blog-initial aria-hidden="true">B</span>
      </section>

      <nav class="blog-menu-bar" aria-label="블로그 메뉴">
        <a href="./my-blog.html" aria-current="page">블로그 홈</a>
        <a class="blog-write-button" href="./editor.html?mode=new">글쓰기</a>
      </nav>

      <div class="blog-body-layout">
        <aside class="blog-side-panel" aria-label="블로그 정보">
          <div class="blog-profile-box">
            <span class="blog-profile-mark" data-blog-initial aria-hidden="true">B</span>
            <div>
              <strong data-profile-title>Blog</strong>
              <span data-profile-id>@blog</span>
            </div>
          </div>
          <nav class="blog-side-links" aria-label="블로그 바로가기">
            <a href="./my-blog.html" aria-current="page">전체글</a>
          </nav>
        </aside>

        <section class="blog-board" id="blog-posts" aria-labelledby="personal-feed-title" data-blog-board>
          <div class="blog-board-head">
            <h2 id="personal-feed-title">전체보기 <span data-blog-count>0개의 글</span></h2>
            <button class="blog-board-toggle" type="button" data-list-toggle>목록닫기</button>
          </div>

          <div class="blog-table" aria-label="내 블로그 글 목록">
            <div class="blog-table-head" aria-hidden="true">
              <span>글 제목</span>
              <span>조회수</span>
              <span>작성일</span>
            </div>
            <div data-post-list>
              <div class="blog-empty-row">
                <span>아직 작성된 글이 없습니다.</span>
                <span>0</span>
                <span>-</span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="./session.js" defer></script>
    <script src="./my-blog.js" defer></script>
  </body>
</html>
