<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="블로그 회원가입">
    <title>회원가입 | 블로그 홈</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./password-toggle.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="블로그 홈">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span>Blog</span>
      </a>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button" href="./login.html">로그인</a>
        <a class="auth-button auth-button-primary" href="./signup.html" aria-current="page">회원가입</a>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-shell" aria-labelledby="signup-title">
        <div class="auth-copy">
          <p class="eyebrow">계정</p>
          <h1 id="signup-title">회원가입</h1>
          <p>이메일 없이 아이디와 비밀번호로 계정을 만듭니다.</p>
        </div>

        <form class="auth-card" data-auth-form data-mode="signup">
          <div class="form-field">
            <label for="user-id">아이디</label>
            <input id="user-id" name="user-id" type="text" autocomplete="username" required>
            <p class="field-help">2~30자, 문자와 숫자, 마침표, 밑줄, 하이픈 사용 가능</p>
          </div>
          <div class="form-field">
            <label for="password">비밀번호</label>
            <div class="password-toggle-wrap">
              <input id="password" name="password" type="password" autocomplete="new-password" required>
              <button class="password-toggle-button" type="button" data-password-toggle="password" aria-label="비밀번호 표시" aria-pressed="false">
                <span class="password-toggle-icon" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <div class="form-field">
            <label for="confirm-password">비밀번호 확인</label>
            <div class="password-toggle-wrap">
              <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" required>
              <button class="password-toggle-button" type="button" data-password-toggle="confirm-password" aria-label="비밀번호 표시" aria-pressed="false">
                <span class="password-toggle-icon" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <div class="form-field">
            <label for="password-hint">비밀번호 힌트</label>
            <input id="password-hint" name="password-hint" type="text" maxlength="160" autocomplete="off">
            <p class="field-help">비밀번호 자체는 적지 말아주세요.</p>
          </div>
          <button class="auth-submit" type="submit">회원가입</button>
          <p class="auth-message" data-auth-message role="status" aria-live="polite"></p>
          <p class="auth-link">이미 계정이 있나요? <a href="./login.html">로그인</a></p>
        </form>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./auth.js" defer></script>
    <script src="./scroll-jump.js" defer></script>
    <script>
      document.addEventListener('click', (event) => {
        const button = event.target.closest('[data-password-toggle]');
        if (!button) return;
        const input = document.getElementById(button.dataset.passwordToggle);
        if (!input) return;
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        button.classList.toggle('is-visible', show);
        button.setAttribute('aria-pressed', String(show));
        button.setAttribute('aria-label', show ? '비밀번호 숨김' : '비밀번호 표시');
      });
    </script>
  </body>
</html>
