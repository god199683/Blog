<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="자료실 공간 관리 대시보드">
    <title>공간 관리 | 자료실</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="space-dashboard-page">
    <header class="site-header">
      <a class="brand" href="./materials.html" aria-label="자료실로 이동">
        <span class="brand-mark" data-space-brand-initial aria-hidden="true">B</span>
        <span data-space-brand-title>자료실</span>
      </a>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button auth-login" href="./login.html">로그인</a>
        <a class="auth-button auth-signup" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="space-dashboard-main" aria-label="공간 관리">
      <section class="space-dashboard-shell">
        <header class="space-dashboard-topbar">
          <div>
            <p class="space-dashboard-kicker">공간 관리</p>
            <h1 data-space-title>공간</h1>
            <p data-space-summary>저장된 맵을 불러오는 중입니다.</p>
          </div>
          <div class="space-dashboard-actions">
            <a class="editor-ghost-button" href="./materials.html">자료실</a>
            <a class="editor-primary-button" href="./map-editor.html" data-space-edit-link>맵 수정</a>
          </div>
        </header>

        <div class="space-dashboard-grid">
          <section class="space-dashboard-preview" aria-labelledby="space-preview-title">
            <div class="space-panel-head">
              <h2 id="space-preview-title">맵 미리보기</h2>
              <span data-space-updated>-</span>
            </div>
            <div class="space-preview-canvas-wrap">
              <canvas data-space-preview width="960" height="560" aria-label="공간 맵 미리보기"></canvas>
            </div>
          </section>

          <section class="space-dashboard-stats" aria-label="공간 지표">
            <article>
              <span>맵 크기</span>
              <strong data-space-stat="size">-</strong>
            </article>
            <article>
              <span>그린 선</span>
              <strong data-space-stat="tiles">0</strong>
            </article>
            <article>
              <span>표식</span>
              <strong data-space-stat="markers">0</strong>
            </article>
            <article>
              <span>요소</span>
              <strong data-space-stat="coverage">0%</strong>
            </article>
          </section>

          <section class="space-dashboard-note" aria-labelledby="space-note-title">
            <div class="space-panel-head">
              <h2 id="space-note-title">설명</h2>
            </div>
            <p data-space-note>설명이 없습니다.</p>
          </section>

          <section class="space-dashboard-markers" aria-labelledby="space-marker-title">
            <div class="space-panel-head">
              <h2 id="space-marker-title">표식 목록</h2>
            </div>
            <div data-space-markers></div>
          </section>
        </div>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./space-dashboard.js" defer></script>
  </body>
</html>
