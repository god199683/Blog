<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="자료실 공간 관리 페이지">
    <title>공간 관리 | 자료실</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="space-dashboard-page garden-app-page">
    <aside class="space-settings-sidebar garden-sidebar" aria-label="공간 관리 메뉴">
      <div class="space-settings-brand garden-brand">
        <span class="space-settings-mark" data-space-brand-initial aria-hidden="true">B</span>
        <div>
          <strong data-space-brand-title>정원 관리</strong>
          <span>정원 관리 시스템</span>
        </div>
        <button class="garden-sidebar-toggle" type="button" data-action="toggle-sidebar" data-space-sidebar-toggle aria-expanded="true" aria-label="사이드바 접기" title="사이드바 접기">
          <span aria-hidden="true"></span>
        </button>
      </div>

      <nav class="space-settings-nav garden-nav">
        <a href="#dashboard" data-space-page-link="dashboard" aria-current="page">
          <span aria-hidden="true">🏠</span>
          대시보드
        </a>
        <a href="#map" data-space-page-link="map">
          <span aria-hidden="true">🌍</span>
          정원 맵
        </a>
        <a href="#zones" data-space-page-link="zones">
          <span aria-hidden="true">🗺️</span>
          구역 관리
        </a>
        <a href="#creatures" data-space-page-link="creatures">
          <span aria-hidden="true">🌱</span>
          동식물 관리
        </a>
        <a href="#byproducts" data-space-page-link="byproducts">
          <span aria-hidden="true">💎</span>
          부산물/채집품
        </a>
        <a href="#settings" data-space-page-link="settings">
          <span aria-hidden="true">⚙️</span>
          시스템 설정
        </a>
        <a href="#access" data-space-page-link="access">
          <span aria-hidden="true">🔑</span>
          출입 관리
        </a>
        <a href="./materials.html#spaces">
          <span aria-hidden="true">←</span>
          공간 목록
        </a>
      </nav>

      <div class="space-settings-status garden-status">
        <span aria-hidden="true"></span>
        시스템 활성 중
      </div>
    </aside>

    <main class="space-dashboard-main garden-main" aria-label="공간 관리">
      <div class="space-settings-container garden-container" data-space-view>
        <section class="garden-loading-card">
          <p>공간 정보를 불러오는 중입니다.</p>
        </section>
      </div>
    </main>

    <script src="./session.js" defer></script>
    <script src="./space-dashboard.js" defer></script>
  </body>
</html>
