<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="내 블로그 휴지통">
    <title>휴지통 | Blog</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="trash-page">
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="My blog home">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span data-brand-text>Blog</span>
      </a>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button auth-login" href="./login.html">로그인</a>
        <a class="auth-button auth-signup" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="trash-page-main">
      <section class="trash-page-shell" aria-labelledby="trash-title">
        <div class="trash-page-topbar">
          <div>
            <a class="trash-back-link" href="./my-blog.html">← 내 블로그</a>
            <h1 id="trash-title">휴지통</h1>
            <p data-trash-summary>삭제된 항목을 불러오는 중입니다.</p>
          </div>
          <div class="trash-page-actions" aria-label="휴지통 기능">
            <button type="button" data-trash-selection-toggle aria-label="선택 모드" title="선택 모드">
              <span class="panel-action-icon icon-select" aria-hidden="true"></span>
            </button>
            <button type="button" data-trash-restore aria-label="복원" title="복원" disabled>
              <span class="panel-action-icon icon-restore" aria-hidden="true"></span>
            </button>
            <button type="button" data-trash-delete-selected aria-label="선택 삭제" title="선택 삭제" disabled>
              <span class="panel-action-icon icon-delete" aria-hidden="true"></span>
            </button>
            <button type="button" data-trash-empty aria-label="비우기" title="비우기" disabled>
              <span class="panel-action-icon icon-empty" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <p class="trash-page-status" data-trash-status aria-live="polite"></p>
        <div class="trash-page-list" data-trash-list></div>
      </section>
    </main>

    <script src="./session.js" defer></script>
    <script src="./trash.js" defer></script>
  </body>
</html>
