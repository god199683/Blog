<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="블로그 글 보기">
    <title>글 보기 | Blog</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="viewer-page">
    <header class="site-header">
      <a class="brand" href="./my-blog.html" aria-label="My blog home">
        <span class="brand-mark" aria-hidden="true">B</span>
        <span data-brand-text>Blog</span>
      </a>
      <div class="auth-actions" aria-label="계정 메뉴" data-auth-actions>
        <a class="auth-button auth-login" href="./login.html">로그인</a>
        <a class="auth-button auth-signup" href="./signup.html">회원가입</a>
      </div>
    </header>

    <main class="viewer-main">
      <article class="viewer-shell">
        <div class="viewer-topbar">
          <button class="viewer-back-button" type="button" data-viewer-back>뒤로</button>
          <div class="viewer-book-titleblock">
            <h1 data-viewer-title>글을 불러오는 중입니다</h1>
            <p class="viewer-location" data-viewer-location></p>
          </div>
          <div class="viewer-topbar-actions">
            <button class="viewer-book-button" type="button" data-viewer-book-toggle>책 읽기</button>
            <div class="viewer-reader-controls" data-viewer-reader-controls hidden>
              <select data-viewer-theme aria-label="읽기 테마">
                <option value="sky">하늘</option>
              </select>
              <select data-viewer-width aria-label="읽기 폭">
                <option value="narrow">좁게</option>
                <option value="standard">표준</option>
                <option value="wide">넓게</option>
              </select>
              <button type="button" data-viewer-font-down aria-label="글씨 작게">A-</button>
              <span data-viewer-font-size>18px</span>
              <button type="button" data-viewer-font-up aria-label="글씨 크게">A+</button>
              <button type="button" data-viewer-book-close aria-label="책 읽기 닫기">×</button>
            </div>
            <button class="viewer-edit-button" type="button" data-viewer-edit hidden>수정</button>
          </div>
        </div>
        <div class="viewer-body" data-viewer-body></div>
        <button class="viewer-page-arrow viewer-page-arrow-prev" type="button" data-viewer-prev-side aria-label="이전 글">←</button>
        <button class="viewer-page-arrow viewer-page-arrow-next" type="button" data-viewer-next-side aria-label="다음 글">→</button>
        <div class="viewer-book-nav" data-viewer-book-nav hidden>
          <button type="button" data-viewer-first>처음</button>
          <button type="button" data-viewer-prev>이전 글</button>
          <div class="viewer-book-progress">
            <input type="range" min="1" max="1" value="1" data-viewer-progress aria-label="읽기 위치" disabled>
            <span data-viewer-book-position>1 / 1</span>
          </div>
          <button type="button" data-viewer-next>다음 글</button>
          <button type="button" data-viewer-last>끝</button>
        </div>
        <p class="viewer-message" data-viewer-message></p>
      </article>
    </main>

    <script src="./session.js" defer></script>
    <script src="./viewer.js" defer></script>
    <script src="./viewer-book-folder-guard.js" defer></script>
    <script src="./scroll-jump.js" defer></script>
  </body>
</html>
